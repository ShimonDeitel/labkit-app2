name: Labkit
options:
  bundleIdPrefix: com.shimondeitel.labkit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Labkit:
    type: application
    platform: iOS
    sources:
      - path: Labkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.labkit
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Labkit/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LabkitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LabkitTests
      - path: Labkit.storekit
    dependencies:
      - target: Labkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.labkit.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LabkitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LabkitUITests
    dependencies:
      - target: Labkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.labkit.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Labkit:
    build:
      targets:
        Labkit: all
        LabkitTests: [test]
        LabkitUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Labkit.storekit
    test:
      config: Debug
      storeKitConfiguration: Labkit.storekit
      targets:
        - LabkitTests
        - LabkitUITests
    archive:
      config: Release
